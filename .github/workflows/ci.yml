name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-cs-fixer:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHP CS Fixer
        run: composer cs-check

  tests:
    name: Tests (PHP ${{ matrix.php }}, TYPO3 ${{ matrix.typo3 }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            typo3: '^12.4'
          - php: '8.3'
            typo3: '^12.4'
          - php: '8.2'
            typo3: '^13.4'
          - php: '8.3'
            typo3: '^13.4'
          - php: '8.4'
            typo3: '^13.4'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: xdebug

      - name: Install TYPO3 ${{ matrix.typo3 }}
        run: |
          composer require --no-update typo3/cms-core:${{ matrix.typo3 }}
          composer install --no-progress --prefer-dist

      - name: Run unit tests
        run: composer test -- --testsuite Unit

      - name: Run functional tests
        run: composer test -- --testsuite Functional
        env:
          typo3DatabaseDriver: pdo_sqlite
